name: kopiyantea_pos
description: Offline-first Flutter POS for an Indonesian coffee shop chain.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local DB
  # Pinned to 2.20.x — drift_dev 2.21+ has a `Null is not InterfaceElement`
  # bug with analyzer 6.4.x (which we're stuck on via freezed 2.x /
  # riverpod 2.x transitive constraints). Bump together with freezed 3.x
  # migration if/when we move there.
  drift: '>=2.20.0 <2.21.0'
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Backend
  supabase_flutter: ^2.5.6

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Hardware
  mobile_scanner: ^5.1.1
  print_bluetooth_thermal: ^1.1.0
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^11.3.1

  # Background — workmanager added in Phase 6 (deferred; 0.5.2 is broken on
  # modern Flutter embedding, awaiting 0.6.x or upstream fix).

  # UI
  lucide_icons_flutter: ^3.0.5

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  logger: ^2.3.0

  # Networking + cert pinning
  dio: ^5.5.0+1
  http_certificate_pinning: ^3.0.0
  crypto: ^3.0.5

  # Env
  envied: ^0.5.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

  # Codegen
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: '>=2.20.0 <2.21.0'
  riverpod_generator: ^2.4.0
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
